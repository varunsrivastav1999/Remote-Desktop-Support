services:
  # ─── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rsadmin
      POSTGRES_PASSWORD: support@2026
      POSTGRES_DB: remote_support
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsadmin -d remote_support"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (Channels Layer) ───────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── TURN Relay (Optional, AnyDesk/RustDesk-style fallback) ─────────
  turn:
    image: coturn/coturn:latest
    restart: unless-stopped
    command:
      - -n
      - --log-file=stdout
      - --lt-cred-mech
      - --realm=${TURN_REALM:-remote-support.local}
      - --user=${TURN_USERNAME:-remote}:${TURN_PASSWORD:-support@2026}
      - --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --no-tls
      - --no-dtls
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

  # ─── Django Backend (ASGI via Daphne) ─────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 remote_desktop_prj.asgi:application"
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/sessions/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Vue.js Frontend (Vite Dev Server) ────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_BACKEND_HTTP_URL: http://backend:8000
      VITE_BACKEND_WS_URL: ws://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
